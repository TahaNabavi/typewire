<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TypeWire logo">
  <defs>
    <linearGradient id="tile" x1="70" y1="52" x2="452" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="256" y1="40" x2="256" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- gradient squircle tile -->
  <rect x="40" y="40" width="432" height="432" rx="128" fill="url(#tile)"/>
  <rect x="40" y="40" width="432" height="432" rx="128" fill="url(#sheen)"/>
  <rect x="40.5" y="40.5" width="431" height="431" rx="127.5" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>

  <!-- the wire: typed signal flowing between two endpoints -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <path d="M150 316 C 200 210, 236 210, 256 256 C 276 302, 312 302, 362 196"
          stroke-width="30" stroke-opacity="0.98"/>
  </g>

  <!-- endpoint nodes -->
  <circle cx="150" cy="316" r="30" fill="#ffffff"/>
  <circle cx="150" cy="316" r="14" fill="#3b82f6"/>
  <circle cx="362" cy="196" r="30" fill="#ffffff"/>
  <circle cx="362" cy="196" r="14" fill="#8b5cf6"/>

  <!-- signal pulse riding the wire -->
  <circle cx="256" cy="256" r="15" fill="#ffffff"/>
  <circle cx="256" cy="256" r="6.5" fill="#22d3ee"/>
</svg>
